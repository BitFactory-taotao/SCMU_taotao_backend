server:
  port: 8080
spring:
  mvc:
    servlet:
      path: /api/v1/campus-taotao
  application:
    name: taotao
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/taotao_db?useSSL=false&serverTimezone=UTC
    username: root
    password: xie060106
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: localhost
      port: 6379
      password: dev123456
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:com/bit/scmu_taotao/mapper/**/*.xml
  type-aliases-package: com.bit.scmu_taotao.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
logging:
  level:
    com.hmdp: debug